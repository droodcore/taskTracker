services:
  db:
    image: postgres:16-alpine
    container_name: task_tracker_db
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - task_tracker_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  redis:
    image: redis:7-alpine
    container_name: task_tracker_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  task_tracker_db_data: