spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:task_tracker}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres_secret_pass}
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    contexts: test
