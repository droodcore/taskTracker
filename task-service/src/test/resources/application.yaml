spring:
  datasource:
    url: jdbc:h2:mem:tasktracker;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  kafka:
    bootstrap-servers: localhost:9092
    admin:
      auto-create: false
    data:
      redis:
        repositories:
          enabled: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  cache:
    redis-enabled: false
  kafka:
    topic:
      task-notifications: test-task-notifications
