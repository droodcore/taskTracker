spring:
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    consumer:
      group-id: notification-service-test
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.taskcontracts.event"
        spring.json.value.default.type: "com.example.taskcontracts.event.TaskNotificationEvent"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

app:
  kafka:
    topic:
      task-notifications: test-task-notifications
      dlt-suffix: -dlt
    retry:
      attempts: 3
      initial-delay-ms: 100
      multiplier: 2.0
      max-delay-ms: 500
      auto-create-topics: false

resilience4j:
  circuitbreaker:
    instances:
      notification-delivery:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        minimum-number-of-calls: 3
        permitted-number-of-calls-in-half-open-state: 2
        failure-rate-threshold: 50
        wait-duration-in-open-state: 1s
