spring:
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
    consumer:
      group-id: notification-service-test
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.taskcontracts.event"
        spring.json.value.default.type: "com.example.taskcontracts.event.TaskNotificationEvent"

app:
  kafka:
    topic:
      task-notifications: test-task-notifications
