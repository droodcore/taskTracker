global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'task-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['task-service:8080']

  - job_name: 'notification-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['notification-service:8081']
